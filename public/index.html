<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Guia - Santa Group</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="applicationRoot"></div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => App.init());

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                // Se houver uma atualização de código, ele detecta e avisa
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Se quiser algo automático: window.location.reload();
                            console.log('Nova versão disponível. Recarregue para atualizar.');
                        }
                    };
                };
            });
        }
    </script>
</body>
</html>
